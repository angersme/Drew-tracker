// ── GOOGLE FIT ─────────────────────────────────────────────────────────────
const GFIT_CLIENT_ID = '599965021266-s2gcu212ksoim01qcj0tlisigeisph1b.apps.googleusercontent.com';
const GFIT_SCOPES = [
  'https://www.googleapis.com/auth/fitness.activity.read',
  'https://www.googleapis.com/auth/fitness.sleep.read'
].join(' ');

let gfitToken = null;

function loadGoogleAPI() {
  return new Promise((resolve) => {
    if(window.gapi) { resolve(); return; }
    const script = document.createElement('script');
    script.src = 'https://apis.google.com/js/api.js';
    script.onload = () => {
      window.gapi.load('client:auth2', resolve);
    };
    document.head.appendChild(script);
  });
}

async function signInGoogleFit() {
  await loadGoogleAPI();
  await window.gapi.client.init({
    clientId: GFIT_CLIENT_ID,
    scope: GFIT_SCOPES,
    discoveryDocs: []
  });
  const authInstance = window.gapi.auth2.getAuthInstance();
  if(!authInstance.isSignedIn.get()) {
    await authInstance.signIn();
  }
  gfitToken = authInstance.currentUser.get().getAuthResponse().access_token;
  return gfitToken;
}

async function fetchGoogleFitSteps(dateKey) {
  if(!gfitToken) await signInGoogleFit();
  const [y,m,d] = dateKey.split('-').map(Number);
  const startMs = new Date(y,m-1,d,0,0,0).getTime();
  const endMs   = new Date(y,m-1,d,23,59,59).getTime();
  const body = {
    aggregateBy:[{dataTypeName:'com.google.step_count.delta',dataSourceId:'derived:com.google.step_count.delta:com.google.android.gms:estimated_steps'}],
    bucketByTime:{durationMillis:86400000},
    startTimeMillis:startMs,
    endTimeMillis:endMs
  };
  const res = await fetch('https://www.googleapis.com/fitness/v1/users/me/dataset:aggregate',{
    method:'POST',
    headers:{'Authorization':'Bearer '+gfitToken,'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  const data = await res.json();
  const bucket = data.bucket?.[0];
  const steps = bucket?.dataset?.[0]?.point?.reduce((a,p)=>a+(p.value?.[0]?.intVal||0),0)||0;
  return steps;
}

async function fetchGoogleFitSleep(dateKey) {
  if(!gfitToken) await signInGoogleFit();
  const [y,m,d] = dateKey.split('-').map(Number);
  // Sleep for the night: look from noon previous day to noon this day
  const prevDay = new Date(y,m-1,d-1,12,0,0);
  const thisDay = new Date(y,m-1,d,12,0,0);
  const startNs = prevDay.getTime() * 1000000;
  const endNs   = thisDay.getTime() * 1000000;
  const res = await fetch(
    `https://www.googleapis.com/fitness/v1/users/me/sessions?startTime=${prevDay.toISOString()}&endTime=${thisDay.toISOString()}&activityType=72`,
    { headers:{'Authorization':'Bearer '+gfitToken} }
  );
  const data = await res.json();
  const sessions = data.session || [];
  const totalMs = sessions.reduce((a,s)=>{
    const start = parseInt(s.startTimeMillis||0);
    const end   = parseInt(s.endTimeMillis||0);
    return a + Math.max(0, end-start);
  },0);
  return Math.round(totalMs/1000/60/60*10)/10; // hours
}
