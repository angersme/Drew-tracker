// Storage shim — uses localStorage when window.storage not available
const storage = {
  get: async (key) => {
    try {
      if(window.storage && window.storage.get) return window.storage.get(key);
    } catch(e){}
    const v = localStorage.getItem('drewTracker_'+key);
    return v ? {value:v} : null;
  },
  set: async (key, value) => {
    try {
      if(window.storage && window.storage.set) return window.storage.set(key, value);
    } catch(e){}
    localStorage.setItem('drewTracker_'+key, value);
    return {value};
  }
};

// ── GOOGLE FIT ─────────────────────────────────────────────────────────────
const GFIT_CLIENT_ID = '599965021266-s2gcu212ksoim01qcj0tlisigeisph1b.apps.googleusercontent.com';
const GFIT_SCOPES = [
  'https://www.googleapis.com/auth/fitness.activity.read',
  'https://www.googleapis.com/auth/fitness.sleep.read'
].join(' ');

let gfitToken = null;

function loadGoogleAPI() {
  return new Promise((resolve) => {
    if(window.gapi) { resolve(); return; }
    const script = document.createElement('script');
    script.src = 'https://apis.google.com/js/api.js';
    script.onload = () => {
      window.gapi.load('client:auth2', resolve);
    };
    document.head.appendChild(script);
  });
}

async function signInGoogleFit() {
  await loadGoogleAPI();
  await window.gapi.client.init({
    clientId: GFIT_CLIENT_ID,
    scope: GFIT_SCOPES,
    discoveryDocs: []
  });
  const authInstance = window.gapi.auth2.getAuthInstance();
  if(!authInstance.isSignedIn.get()) {
    await authInstance.signIn();
  }
  gfitToken = authInstance.currentUser.get().getAuthResponse().access_token;
  return gfitToken;
}

async function fetchGoogleFitSteps(dateKey) {
  if(!gfitToken) await signInGoogleFit();
  const [y,m,d] = dateKey.split('-').map(Number);
  const startMs = new Date(y,m-1,d,0,0,0).getTime();
  const endMs   = new Date(y,m-1,d,23,59,59).getTime();
  const body = {
    aggregateBy:[{dataTypeName:'com.google.step_count.delta',dataSourceId:'derived:com.google.step_count.delta:com.google.android.gms:estimated_steps'}],
    bucketByTime:{durationMillis:86400000},
    startTimeMillis:startMs,
    endTimeMillis:endMs
  };
  const res = await fetch('https://www.googleapis.com/fitness/v1/users/me/dataset:aggregate',{
    method:'POST',
    headers:{'Authorization':'Bearer '+gfitToken,'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  const data = await res.json();
  const bucket = data.bucket?.[0];
  const steps = bucket?.dataset?.[0]?.point?.reduce((a,p)=>a+(p.value?.[0]?.intVal||0),0)||0;
  return steps;
}

async function fetchGoogleFitSleep(dateKey) {
  if(!gfitToken) await signInGoogleFit();
  const [y,m,d] = dateKey.split('-').map(Number);
  // Sleep for the night: look from noon previous day to noon this day
  const prevDay = new Date(y,m-1,d-1,12,0,0);
  const thisDay = new Date(y,m-1,d,12,0,0);
  const startNs = prevDay.getTime() * 1000000;
  const endNs   = thisDay.getTime() * 1000000;
  const res = await fetch(
    `https://www.googleapis.com/fitness/v1/users/me/sessions?startTime=${prevDay.toISOString()}&endTime=${thisDay.toISOString()}&activityType=72`,
    { headers:{'Authorization':'Bearer '+gfitToken} }
  );
  const data = await res.json();
  const sessions = data.session || [];
  const totalMs = sessions.reduce((a,s)=>{
    const start = parseInt(s.startTimeMillis||0);
    const end   = parseInt(s.endTimeMillis||0);
    return a + Math.max(0, end-start);
  },0);
  return Math.round(totalMs/1000/60/60*10)/10; // hours
}

const LIMIT = [
  {t:'honey',n:'Max ½ tsp — high sugar'},{t:'ranch',n:'Max 1 tbsp — high sodium'},
  {t:'sour cream',n:'Keep to 1 tbsp'},{t:'cream cheese',n:'Small amount only'},
  {t:'turkey bacon',n:'Max 2 strips'},{t:'mayonnaise',n:'Max 1 tsp'},
  {t:'sweet relish',n:'½ tsp max'},{t:'white rice',n:'½ cup max'},
  {t:'tortilla',n:'1 small corn tortilla max'},{t:'lawry',n:'Pinch only — very high sodium'},
  {t:'garlic salt',n:'Swap for garlic powder'},{t:'pasta',n:'½ cup cooked max'},
  {t:'chicken wing',n:'Baked only'},{t:'monster',n:'2–3 per week max'},
  {t:'pineapple',n:'½ cup max'},{t:'watermelon',n:'1 cup max'},{t:'grapes',n:'½ cup serving'},
];
const QUAL_EMOJI = ['','😫','😕','😐','😊','😴'];
const DN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtKey(k) {
  const [y,m,d] = k.split('-');
  const dt = new Date(+y,+m-1,+d);
  return `${DN[dt.getDay()]} ${MN[+m-1]} ${+d}`;
}
function weekKeys() {
  const keys=[], now=new Date();
  for(let i=6;i>=0;i--){ const d=new Date(now); d.setDate(d.getDate()-i); keys.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`); }
  return keys;
}
function checkLists(name='', ing='') {
  const h=(name+' '+ing).toLowerCase();
  return { avoidHit: AVOID.find(a=>h.includes(a)), limitHit: LIMIT.find(l=>h.includes(l.t)) };
}
function calcSleepHrs(bed, wake) {
  if(!bed||!wake) return 0;
  const [bh,bm]=bed.split(':').map(Number), [wh,wm]=wake.split(':').map(Number);
  let m=(wh*60+wm)-(bh*60+bm); if(m<0) m+=1440;
  return Math.round(m/60*10)/10;
}

// ── API CALL ───────────────────────────────────────────────────────────────
async function callClaude(prompt, maxTokens=500) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:maxTokens, messages:[{role:'user',content:prompt}] })
  });
  const d = await r.json();
  return (d.content||[]).map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
}

Numbers only for nutrients. sodium=mg, rest=grams except cal.`);

    if(!f.name.trim()||!f.cal){alert('Name and calories required.');return;}
    onAdd({name:f.name.trim(),cal:parseInt(f.cal)||0,protein:parseFloat(f.protein)||0,carbs:parseFloat(f.carbs)||0,fat:parseFloat(f.fat)||0,sodium:parseFloat(f.sodium)||0,sugar:parseFloat(f.sugar)||0});
    setF({name:'',cal:'',protein:'',carbs:'',fat:'',sodium:'',sugar:''});
  }
  const fields=[['name','text','Food name (required)','col-span'],['cal','number','Calories (required)',''],['protein','number','Protein g',''],['carbs','number','Carbs g',''],['fat','number','Fat g',''],['sodium','number','Sodium mg',''],['sugar','number','Sugar g','']];

        {['cal','protein','carbs','fat','sodium','sugar'].map(k=>(

}

// ── CHECKER TAB ────────────────────────────────────────────────────────────
function CheckerTab({ todayTotals }) {
  const [upc,setUpc]=useState('');
  const [nameQ,setNameQ]=useState('');
  const [mode,setMode]=useState('name');
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);

  async function check() {
    const query = mode==='name' ? nameQ.trim() : upc.trim();
    if(!query) return;
    setLoading(true); setResult(null);
    const calLeft=Math.max(0,GOALS.cal-todayTotals.cal);
    const sodLeft=Math.max(0,GOALS.sodium-todayTotals.sodium);
    const queryDesc = mode==='name' ? `food name: "${query}"` : `UPC barcode: "${query}" (also try padded: "${query.padStart(12,'0')}")`;
    try {
      const raw = await callClaude(`You are a nutrition coach for Drew Richardson, 41, delivery worker, losing weight from 230 to 185 lbs. Daily targets: 1800 cal, 1500mg sodium max, low sugar, 150g protein.

Today so far: ${todayTotals.cal} cal, ${todayTotals.sodium}mg sodium, ${Math.round(todayTotals.sugar)}g sugar, ${Math.round(todayTotals.protein)}g protein.
Remaining budget: ${calLeft} cal, ${sodLeft}mg sodium.

Product to check — ${queryDesc}

Drew's avoid list: pepperoni, salami, cracklins, swedish meatballs, high fructose corn syrup, sodium nitrate.
Drew's limit list: honey, ranch, sour cream, cream cheese, turkey bacon, mayonnaise, white rice, lawry's salt, pasta, chicken wings (baked only).

Identify the product, get its nutrition facts, then give a verdict. Respond ONLY with this JSON (no markdown):
{"productName":"Name","brand":"Brand","cal":0,"protein":0,"sodium":0,"sugar":0,"servingSize":"serving","verdict":"EAT","icon":"✅","headline":"Short headline","explanation":"2-3 direct sentences about whether Drew should eat this given his remaining budget today.","tip":"One swap or portion tip if needed","calAfter":${calLeft},"sodAfter":${sodLeft}}

verdict must be exactly EAT, CAUTION, or AVOID. calAfter and sodAfter should subtract this food's values from the remaining budget.`,700);
      setResult(JSON.parse(raw));
    } catch(e) { setResult({error:true}); }
    setLoading(false);
  }

  const cls = result?.verdict==='EAT'?'good':result?.verdict==='CAUTION'?'warn':'bad';
  return (
    <div>
      <div style={{fontSize:12,color:C.muted,marginBottom:14}}>Check any food <strong>before eating</strong>. AI analyzes it against your goals and remaining budget.</div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,overflow:'hidden',marginBottom:12}}>
        <div style={{display:'flex',borderBottom:`1px solid ${C.border}`}}>
          {[['name','🔤 By Name'],['barcode','🔢 By Barcode']].map(([m,l])=>(
            <button key={m} onClick={()=>{setMode(m);setResult(null);}} style={{flex:1,padding:'11px 6px',textAlign:'center',fontFamily:'monospace',fontSize:9,color:mode===m?C.purple:C.muted,background:mode===m?'rgba(183,148,244,.1)':'none',border:'none',borderBottom:`2px solid ${mode===m?C.purple:'transparent'}`,cursor:'pointer',letterSpacing:1}}>{l}</button>
          ))}
        </div>
        <div style={{padding:13}}>
          {mode==='name'&&(
            <div style={{display:'flex',gap:8,marginBottom:6}}>
              <input style={s.input} value={nameQ} onChange={e=>setNameQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&check()} placeholder="e.g. Doritos, oatmeal, chicken wing..." type="text" />
              <button style={s.btn(C.purple)} onClick={check} disabled={loading}>{loading?<><Spinner/>Checking...</>:'Check It'}</button>
            </div>
          )}
          {mode==='barcode'&&(
            <div style={{display:'flex',gap:8,marginBottom:6}}>
              <input style={s.input} value={upc} onChange={e=>setUpc(e.target.value)} onKeyDown={e=>e.key==='Enter'&&check()} placeholder="Enter UPC barcode number" type="number" />
              <button style={s.btn(C.purple)} onClick={check} disabled={loading}>{loading?<><Spinner/>Checking...</>:'Check It'}</button>
            </div>
          )}
          <div style={{fontSize:10,color:C.muted}}>Today remaining: <span style={{color:C.green}}>{Math.max(0,GOALS.cal-todayTotals.cal)} cal</span> · <span style={{color:todayTotals.sodium>1000?C.amber:C.green}}>{Math.max(0,GOALS.sodium-todayTotals.sodium)}mg Na</span></div>
        </div>
      </div>

      {loading && <div style={{textAlign:'center',padding:20,color:C.muted,fontFamily:'monospace',fontSize:11}}><Spinner/>Analyzing product...</div>}

      {result&&!result.error&&(
        <div style={{borderRadius:12,padding:16,border:`1px solid ${cls==='good'?C.greenDim:cls==='warn'?'rgba(255,183,0,.3)':'rgba(255,77,77,.4)'}`,background:`${cls==='good'?'rgba(0,232,122,.05)':cls==='warn'?'rgba(255,183,0,.05)':'rgba(255,77,77,.05)'}`}}>
          <div style={{textAlign:'center',fontSize:32,marginBottom:6}}>{result.icon}</div>
          <div style={{fontFamily:'Georgia,serif',fontSize:24,fontWeight:900,letterSpacing:2,textAlign:'center',color:cls==='good'?C.green:cls==='warn'?C.amber:C.red,marginBottom:4}}>{result.verdict}</div>
          <div style={{fontWeight:600,textAlign:'center',marginBottom:10}}>{result.headline}</div>
          <div style={{fontWeight:600,color:C.muted,fontSize:11,marginBottom:4}}>{result.productName} {result.brand?`· ${result.brand}`:''}</div>
          <div style={{fontSize:13,lineHeight:1.7,marginBottom:10}}>{result.explanation}</div>
          {result.tip&&<div style={{color:C.amber,fontSize:12,marginBottom:12}}>💡 {result.tip}</div>}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6}}>
            {[['CAL LEFT AFTER',(result.calAfter||0),(result.calAfter||0)<0],['Na LEFT AFTER',(result.sodAfter||0)+'mg',(result.sodAfter||0)<0],['PROTEIN',result.protein+'g',false]].map(([l,v,bad])=>(
              <div key={l} style={{background:'rgba(0,0,0,.3)',borderRadius:6,padding:8,textAlign:'center'}}>
                <div style={{fontFamily:'Georgia,serif',fontSize:18,fontWeight:700,color:bad?C.red:C.green}}>{v}</div>
                <div style={{fontSize:9,color:C.muted,marginTop:1,fontFamily:'monospace'}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
      )}
      {result?.error&&<div style={{color:C.red,fontFamily:'monospace',fontSize:11,padding:10}}>Lookup failed. Try typing the full barcode number.</div>}
    </div>
  );
}

// ── SLEEP TAB ──────────────────────────────────────────────────────────────
function SleepTab({ sleepLog, setSleepLog }) {
  const [type,setType]=useState('night');
  const [bed,setBed]=useState('22:00');
  const [wake,setWake]=useState('02:45');
  const [qual,setQual]=useState(0);
  const [notes,setNotes]=useState('');
  const [saved,setSaved]=useState(false);
  const hrs = calcSleepHrs(bed,wake);
  const keys = weekKeys();

  function save(){
    if(!hrs){alert('Set start and end times first.');return;}
    const entry={id:Date.now(),date:todayKey(),type,hrs,quality:qual,bed,wake,notes:notes.trim()};
    setSleepLog(prev=>[entry,...prev]);
    setQual(0);setNotes('');setSaved(true);setTimeout(()=>setSaved(false),2000);
  }
  function del(id){ setSleepLog(prev=>prev.filter(s=>s.id!==id)); }

  const todayEntries = sleepLog.filter(s=>s.date===todayKey());
  const nightHrsDay = (k)=>sleepLog.filter(s=>s.date===k&&s.type!=='nap').reduce((a,s)=>a+s.hrs,0);
  const totalHrsDay = (k)=>sleepLog.filter(s=>s.date===k).reduce((a,s)=>a+s.hrs,0);

  const weekData = keys.map(k=>({label:DN[new Date(k+'T12:00:00').getDay()],v:totalHrsDay(k),night:nightHrsDay(k)}));

  return (
    <div>

// ── HISTORY TAB ────────────────────────────────────────────────────────────

  return (
    <div>
      {keys.map(k=>{
        const d=dayLog[k], sl=sleepLog.filter(s=>s.date===k), totalSleep=sl.reduce((a,s)=>a+s.hrs,0);
        return (
          <div key={k} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,marginBottom:9,overflow:'hidden'}}>
            <div onClick={()=>setOpen(open===k?null:k)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 13px',background:C.surface,borderBottom:`1px solid ${C.border}`,cursor:'pointer'}}>
              <div style={{fontFamily:'monospace',fontSize:10,color:C.green}}>{fmtKey(k)}</div>
              <div style={{display:'flex',gap:8,fontFamily:'monospace',fontSize:9,color:C.muted,flexWrap:'wrap'}}>
                <span>{(d.cal||0).toLocaleString()} cal</span>
                <span>{(d.steps||0).toLocaleString()} steps</span>
                <span>{d.sodium||0}mg Na</span>
                {totalSleep>0&&<span>😴{totalSleep.toFixed(1)}h</span>}
              </div>
            </div>
            {open===k&&(
              <div style={{padding:'11px 13px'}}>
                {(d.foods||[]).map((f,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',borderBottom:`1px solid ${C.border}`,fontSize:10,color:C.muted}}><span>{f.name}</span><span style={{fontFamily:'monospace'}}>{f.cal}cal{f.sodium?` · ${f.sodium}mg Na`:''}</span></div>)}
                {d.workout&&<div style={{fontSize:11,color:C.amber,marginTop:7}}>💪 {d.workout}</div>}
                <div style={{fontSize:10,color:C.muted,marginTop:4,fontFamily:'monospace'}}>💧{d.water||0}oz · P:{d.protein||0}g · Sug:{d.sugar||0}g</div>

  );
}

// ── WEEKLY TAB ─────────────────────────────────────────────────────────────
function WeeklyTab({ dayLog, sleepLog }) {
  const keys = weekKeys();
  const ents = keys.map(k=>dayLog[k]).filter(Boolean);
  const n = ents.length;
  const av = fn => n?Math.round(ents.reduce((a,e)=>a+(e[fn]||0),0)/n):0;
  const totalSleepDay = k=>sleepLog.filter(s=>s.date===k).reduce((a,s)=>a+s.hrs,0);
  const sleepVals = keys.map(k=>totalSleepDay(k)).filter(v=>v>0);
  const avgSleep = sleepVals.length?(sleepVals.reduce((a,b)=>a+b,0)/sleepVals.length).toFixed(1):'—';

  const calData = keys.map(k=>({label:DN[new Date(k+'T12:00:00').getDay()],v:dayLog[k]?.cal||0}));
  const sodData = keys.map(k=>({label:DN[new Date(k+'T12:00:00').getDay()],v:dayLog[k]?.sodium||0}));
  const sleepData = keys.map(k=>({label:DN[new Date(k+'T12:00:00').getDay()],v:totalSleepDay(k),night:sleepLog.filter(s=>s.date===k&&s.type!=='nap').reduce((a,s)=>a+s.hrs,0)}));

  return (
    <div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:9,marginBottom:16}}>
        {[['Days Logged',n],['Avg Cal/Day',n?av('cal').toLocaleString():'—'],['Avg Steps',n?av('steps').toLocaleString():'—'],['Workouts',ents.filter(e=>e.workout&&!e.workout.includes('Rest')).length],['Avg Sodium',n?av('sodium')+'mg':'—'],['Avg Sleep',avgSleep+'h']].map(([l,v])=>(
          <div key={l} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:12,textAlign:'center'}}>
            <div style={{fontFamily:'Georgia,serif',fontSize:24,fontWeight:900,color:C.green,lineHeight:1}}>{v}</div>
            <div style={{fontSize:9,color:C.muted,marginTop:3}}>{l}</div>
          </div>
        ))}
      </div>
      <div style={s.secLabel}>Calories (goal 1,600–1,900)</div>
      <BarChart data={calData} maxVal={1800} colorFn={v=>v>2100?C.red:v>1900?C.amber:C.green} />
      <div style={{...s.secLabel,marginTop:18}}>Sodium (goal &lt;1,500mg)</div>
      <BarChart data={sodData} maxVal={1500} colorFn={v=>v>1500?C.red:v>1000?C.amber:C.green} />
      <div style={{...s.secLabel,marginTop:18}}>Sleep (goal 7hrs)</div>
      {(() => {
        const max=Math.max(10,...sleepData.map(d=>d.v));
        const goalPct=Math.round((7/max)*100);
        return sleepData.map((d,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:9,marginBottom:7}}>
            <div style={{fontFamily:'monospace',fontSize:9,color:C.muted,width:26}}>{d.label}</div>
            <div style={{flex:1,height:17,background:C.card,borderRadius:4,overflow:'hidden',position:'relative'}}>
              <div style={{height:'100%',width:`${d.v?Math.round((d.v/max)*100):0}%`,background:d.night>=7?C.green:d.night>=5?C.amber:d.v>0?C.red:C.border,borderRadius:4}} />
              <div style={{position:'absolute',top:0,bottom:0,left:`${goalPct}%`,width:1,background:'rgba(183,148,244,.6)'}} />
            </div>
            <div style={{fontFamily:'monospace',fontSize:9,color:C.muted,width:40,textAlign:'right'}}>{d.v?`${d.v}h`:'—'}</div>
          </div>
        ));
      })()}
    </div>
  );
}

// ── WEIGHT TAB ─────────────────────────────────────────────────────────────
function WeightTab({ weights, setWeights }) {
  const [val,setVal]=useState('');
  function save(){
    const v=parseFloat(val);
    if(isNaN(v)||v<50||v>600){alert('Enter a valid weight.');return;}
    setWeights(prev=>[{date:todayKey(),val:v},...prev]);
    setVal('');
  }
  const latest=weights[0]?.val;
  const lost=latest?Math.max(0,230-latest).toFixed(1):0;
  const left=latest?Math.max(0,latest-185).toFixed(1):45;
  const pct=Math.min(100,(lost/45)*100);
  return (
    <div>
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        <input style={s.input} type="number" step="0.1" placeholder="e.g. 229.4 lbs" value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&save()} />
        <button style={s.btn(C.green)} onClick={save}>Log It</button>
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14,marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
          <span style={{fontFamily:'monospace',fontSize:9,color:C.muted}}>START</span>
          <span style={{fontFamily:'monospace',fontSize:9,color:C.muted}}>GOAL</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:9}}>
          <span style={{fontFamily:'Georgia,serif',fontSize:28,fontWeight:900}}>230 lbs</span>
          <span style={{fontFamily:'Georgia,serif',fontSize:28,fontWeight:900,color:C.green}}>185 lbs</span>
        </div>
        <div style={{height:7,background:C.border,borderRadius:99,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${pct}%`,background:`linear-gradient(90deg,${C.greenDim},${C.green})`,borderRadius:99,transition:'width .8s'}} />
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:5}}>
          <span style={{fontSize:11,color:C.muted}}>Lost: <span style={{color:C.green}}>{lost} lbs</span></span>
          <span style={{fontSize:11,color:C.muted}}>Left: <span style={{color:C.amber}}>{left} lbs</span></span>
        </div>
      </div>
      {weights.length>0&&(
        <div>
          <div style={s.secLabel}>Weight Log</div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,overflow:'hidden'}}>
            {weights.map((w,i)=>{
              const prev=weights[i+1];
              const df=prev?(w.val-prev.val).toFixed(1):null;
              return (
                <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 13px',borderBottom:`1px solid ${C.border}`,color:C.muted}}>
                  <span style={{fontFamily:'monospace',fontSize:9}}>{fmtKey(w.date)}</span>
                  <span style={{display:'flex',alignItems:'center',gap:8}}>
                    {df!==null&&<span style={{fontSize:9,fontFamily:'monospace',color:+df>0?C.red:C.green}}>{+df>0?'+':''}{df}</span>}
                    <span style={{fontFamily:'Georgia,serif',fontSize:20,fontWeight:700,color:C.green}}>{w.val} lbs</span>
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ── MAIN APP ───────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('today');
  const [dayLog, setDayLog] = useState({});
  const [sleepLog, setSleepLog] = useState([]);
  const [weights, setWeights] = useState([]);
  const [saveMsg, setSaveMsg] = useState(false);
  const [activeDate, setActiveDate] = useState(todayKey());
  const [syncing, setSyncing] = useState(false);
  const [syncMsg, setSyncMsg] = useState(''); // navigable date

  // Per-day editing state
  const [foods, setFoods] = useState([]);
  const [steps, setSteps] = useState('');
  const [water, setWater] = useState('');
  const [sleep, setSleep] = useState('');
  const [workout, setWorkout] = useState('');
  const [notes, setNotes] = useState('');

  // Load from storage on mount
  useEffect(()=>{
    (async()=>{
      try {
        const [dl,sl,wt] = await Promise.all([
          storage.get('dayLog').catch(()=>null),
          storage.get('sleepLog').catch(()=>null),
          storage.get('weights').catch(()=>null),
        ]);
        if(dl) { const d=JSON.parse(dl.value); setDayLog(d); loadDayInto(d, todayKey()); }
        if(sl) setSleepLog(JSON.parse(sl.value));
        if(wt) setWeights(JSON.parse(wt.value));
      } catch(e){}
    })();
  },[]);

  // Load a specific day's data into the editing fields
  function loadDayInto(log, key) {
    const d = log[key];
    if(d){
      setFoods(d.foods||[]);
      setSteps(d.steps||'');
      setWater(d.water||'');
      setSleep(d.sleep||'');
      setWorkout(d.workout||'');
      setNotes(d.notes||'');
    } else {
      // Blank slate for days with no entry
      setFoods([]); setSteps(''); setWater(''); setSleep(''); setWorkout(''); setNotes('');
    }
  }

  // Navigate days
  function offsetDate(key, days) {
    const [y,m,d] = key.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    dt.setDate(dt.getDate() + days);
    return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  }
  function goToDate(newKey) {
    // Save current unsaved state before switching? No — just navigate, user saves explicitly
    setActiveDate(newKey);
    loadDayInto(dayLog, newKey);
  }
  const isToday = activeDate === todayKey();
  const isFuture = activeDate > todayKey();

  // Streak
  const streak = (() => {
    let s=0, d=new Date();
    while(true){
      const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      if(dayLog[k]){s++;d.setDate(d.getDate()-1);}else break;
    }
    return s;
  })();

  const todayTotals = foods.reduce((a,f)=>({
    cal:a.cal+(f.cal||0),protein:a.protein+(f.protein||0),carbs:a.carbs+(f.carbs||0),
    fat:a.fat+(f.fat||0),sodium:a.sodium+(f.sodium||0),sugar:a.sugar+(f.sugar||0)
  }),{cal:0,protein:0,carbs:0,fat:0,sodium:0,sugar:0});

  async function syncFromGoogleFit() {
    setSyncing(true); setSyncMsg('Connecting to Google Fit...');
    try {
      await signInGoogleFit();
      setSyncMsg('Fetching steps...');
      const steps = await fetchGoogleFitSteps(activeDate);
      setSyncMsg('Fetching sleep...');
      const sleepHrs = await fetchGoogleFitSleep(activeDate);
      if(steps > 0) setSteps(String(steps));
      if(sleepHrs > 0) setSleep(String(sleepHrs));
      setSyncMsg(`✓ Synced! ${steps.toLocaleString()} steps${sleepHrs>0?` · ${sleepHrs}hrs sleep`:''}`);
      setTimeout(()=>setSyncMsg(''),4000);
    } catch(e) {
      setSyncMsg('Sync failed: '+e.message+'. Make sure Google Fit is set up and try again.');
      setTimeout(()=>setSyncMsg(''),5000);
    }
    setSyncing(false);
  }

  async function saveDay(){
    const entry={foods:[...foods],cal:todayTotals.cal,protein:Math.round(todayTotals.protein),carbs:Math.round(todayTotals.carbs),fat:Math.round(todayTotals.fat),sodium:todayTotals.sodium,sugar:Math.round(todayTotals.sugar),steps:parseInt(steps)||0,water:parseFloat(water)||0,sleep:parseFloat(sleep)||0,workout,notes};
    const newLog={...dayLog,[activeDate]:entry};
    setDayLog(newLog);
    await storage.set('dayLog',JSON.stringify(newLog));
    setSaveMsg(true); setTimeout(()=>setSaveMsg(false),2500);
  }

  async function saveSlp(log){ setSleepLog(log); await storage.set('sleepLog',JSON.stringify(log)); }
  async function saveWts(wts){ setWeights(wts); await storage.set('weights',JSON.stringify(wts)); }
  async function deleteDay(k){
    if(!confirm('Delete this entry?'))return;
    const newLog={...dayLog}; delete newLog[k]; setDayLog(newLog);
    await storage.set('dayLog',JSON.stringify(newLog));
  }

  const TABS=[['today','TODAY'],['checker','🔍 CHECK'],['sleep','😴 SLEEP'],['history','HISTORY'],['weekly','WEEKLY'],['weight','WEIGHT']];

  return (
    <div style={s.app}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}} input[type=time]{color-scheme:dark;} input:focus{border-color:#00e87a!important;} button:active{opacity:.8}`}</style>

      {/* HEADER */}
      <div style={s.header}>
        <div style={{maxWidth:820,margin:'0 auto'}}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
            <div>
              <div style={{fontFamily:'monospace',fontSize:9,color:C.green,letterSpacing:3,marginBottom:3}}>FAT LOSS TRACKER</div>
              <h1 style={s.title}>DREW'S <span style={{color:C.green}}>LOG</span></h1>
            </div>
            <div style={s.streak}>🔥 {streak} day streak</div>
          </div>

          {/* GOOGLE FIT SYNC */}
          <div style={{marginTop:10}}>
            <button
              onClick={syncFromGoogleFit}
              disabled={syncing}
              style={{width:'100%',background:'rgba(77,166,255,.1)',border:'1px solid #4da6ff',borderRadius:10,color:'#4da6ff',fontFamily:'monospace',fontSize:11,padding:'11px 14px',cursor:syncing?'wait':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,boxSizing:'border-box'}}
            >
              {syncing
                ? <><span style={{display:'inline-block',width:13,height:13,border:'2px solid rgba(77,166,255,.3)',borderTopColor:'#4da6ff',borderRadius:'50%',animation:'spin .7s linear infinite'}}/>Syncing...</>
                : <>🔄 Sync Steps + Sleep from Google Fit</>
              }
            </button>
            {syncMsg && <div style={{textAlign:'center',fontFamily:'monospace',fontSize:10,color:syncMsg.startsWith('✓')?'#00e87a':'#ff4d4d',marginTop:6,padding:'0 4px'}}>{syncMsg}</div>}
          </div>

          {/* DATE NAVIGATOR */}
          <div style={{display:'flex',alignItems:'center',gap:8,marginTop:12,background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:'10px 12px'}}>
            <button
              onClick={()=>goToDate(offsetDate(activeDate,-1))}
              style={{background:C.card2,border:`1px solid ${C.border}`,borderRadius:7,color:C.text,fontSize:16,width:36,height:36,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}
            >‹</button>
            <div style={{flex:1,textAlign:'center'}}>
              <div style={{fontFamily:'monospace',fontSize:11,color:isToday?C.green:C.amber,fontWeight:700}}>
                {isToday?'📅 TODAY':isFuture?'📅 '+fmtKey(activeDate):'📅 '+fmtKey(activeDate)}
              </div>
              {!isToday&&<div style={{fontSize:10,color:C.muted,marginTop:2}}>Editing past entry — tap Save to update</div>}
            </div>
            <button
              onClick={()=>{ if(!isFuture) goToDate(offsetDate(activeDate,1)); }}
              style={{background:isFuture?C.card:C.card2,border:`1px solid ${isFuture?C.border:C.border}`,borderRadius:7,color:isFuture?C.muted2:C.text,fontSize:16,width:36,height:36,cursor:isFuture?'default':'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,opacity:isFuture?.3:1}}
            >›</button>
            {!isToday&&(
              <button
                onClick={()=>goToDate(todayKey())}
                style={{...s.btn(C.green),padding:'6px 10px',fontSize:9}}
              >Today</button>
            )}
          </div>
        </div>
      </div>

      {/* TABS */}
      <div style={s.tabs}>
        {TABS.map(([id,label])=>(
          <button key={id} style={s.tab(tab===id)} onClick={()=>setTab(id)}>{label}</button>
        ))}
      </div>

      {/* PANELS */}
      <div style={s.main}>
        {tab==='today'&&<FoodTab foods={foods} setFoods={setFoods} steps={parseFloat(steps)||0} setSteps={setSteps} water={parseFloat(water)||0} setWater={setWater} sleep={sleep} setSleep={setSleep} workout={workout} setWorkout={setWorkout} notes={notes} setNotes={setNotes} onSave={saveDay} saveMsg={saveMsg} activeDate={activeDate} />}
        {tab==='checker'&&<CheckerTab todayTotals={todayTotals} />}
        {tab==='sleep'&&<SleepTab sleepLog={sleepLog} setSleepLog={saveSlp} />}
        {tab==='history'&&<HistoryTab dayLog={dayLog} sleepLog={sleepLog} onDelete={deleteDay} />}
        {tab==='weekly'&&<WeeklyTab dayLog={dayLog} sleepLog={sleepLog} />}
        {tab==='weight'&&<WeightTab weights={weights} setWeights={saveWts} />}
      </div>
    </div>
  );
}



// Global error handler to show errors on screen instead of blank
window.onerror = function(msg, src, line, col, err) {
  document.getElementById('root').innerHTML = 
    '<div style="background:#1a0a0a;color:#ff4d4d;padding:20px;font-family:monospace;font-size:12px;min-height:100vh">' +
    '<div style="color:#00e87a;font-size:16px;margin-bottom:16px">DREW\'S TRACKER — Error</div>' +
    '<div>' + msg + '</div>' +
    '<div style="color:#5a7868;margin-top:8px">Line: ' + line + ' Col: ' + col + '</div>' +
    '<div style="color:#5a7868;margin-top:4px">Source: ' + src + '</div>' +
    '</div>';
  return true;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
